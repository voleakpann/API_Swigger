# ===== PostgreSQL Database =====
# Local defaults (work on your PC) + allow override via environment variables (Render/Cloud)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crud_api}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:voleak}
#server.port=${PORT:8080}
spring.datasource.driver-class-name=org.postgresql.Driver
# Required when DB is not reachable at startup (e.g. Render); Hibernate then can't auto-detect dialect from metadata.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===== MySQL Database =====
# Uncomment these lines and comment H2 section to use MySQL
# spring.datasource.url=jdbc:mysql://localhost:3306/crud_api?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.info.title=CRUD API
springdoc.api-docs.info.version=1.0.0
springdoc.api-docs.info.description=REST API for Items with PostgreSQL. Create, read, update, and delete items.

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
